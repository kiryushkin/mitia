version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: mitia_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-mitia}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: mitia_redis
    restart: always
    ports:
      - "6379:6379"

  api:
    build: .
    container_name: mitia_api
    restart: always
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-mitia}
      REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET}
      GIGACHAT_KEY: ${GIGACHAT_KEY}
      YANDEX_API_KEY: ${YANDEX_API_KEY}
      YANDEX_FOLDER_ID: ${YANDEX_FOLDER_ID}
      SUPERADMIN_MASTER_TOKEN: ${SUPERADMIN_MASTER_TOKEN}
    volumes:
      - ./api/chat/uploads:/app/api/chat/uploads
      - ./api/chat/img:/app/api/chat/img
      - ./api/chat/logs:/app/api/chat/logs
    ports:
      - "5007:5007"

  nginx:
    image: nginx:alpine
    container_name: mitia_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./api/chat/static:/app/api/chat/static:ro
    depends_on:
      - api

volumes:
  postgres_data:
