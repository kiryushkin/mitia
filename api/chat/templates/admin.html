                        <line x1="12" y1="16" x2="12.01" y2="16"></line>
                    </svg>
                </div>
                <h3 class="alert-title"></h3>
                <p class="alert-text"></p>
                <div class="alert-buttons">
                    <button class="alert-btn alert-btn-secondary" id="confirm-cancel">Отмена</button>
                    <button class="alert-btn alert-btn-primary warning-bg" id="confirm-yes">Удалить</button>
                </div>
            </div>
        </div>
    </template>
    <template id="tmpl-topup-alert">
        <div class="custom-alert-overlay">
            <div class="custom-alert">
                <div class="alert-icon-box">
                    <span class="alert-currency-sign">₽</span>
                </div>
                <h3 class="alert-title">Пополнение баланса</h3>
                <p class="alert-text">Введите сумму в рублях для пополнения баланса.</p>
                <div class="alert-input-group">
                    <button class="alert-btn alert-btn-secondary alert-btn-step" id="topup-minus">-</button>
                    <div class="alert-input-wrapper">
                        <input type="number" class="alert-input no-spinners" id="topup-amount" value="1000" min="100">
                    </div>
                    <button class="alert-btn alert-btn-secondary alert-btn-step" id="topup-plus">+</button>
                </div>
                <div class="alert-buttons">
                    <button class="alert-btn alert-btn-secondary" id="topup-cancel">Отмена</button>
                    <button class="alert-btn alert-btn-primary" id="topup-confirm">Оплатить</button>
                </div>
            </div>
        </div>
    </template>
    <template id="tmpl-tariffs-alert">
        <div class="custom-alert-overlay">
            <div class="custom-alert tariffs-modal no-bg">
                <div class="tariffs-grid">
                    <div class="tariff-option" data-tariff="start" data-price="0">
                        <div class="tariff-option-name">Старт</div>
                        <div class="tariff-option-price">0 ₽<span>/мес</span></div>
                        <div class="tariff-option-desc">Для малого бизнеса</div>
                        <button class="action-btn sm btn-full-width tariff-select-btn">Выбрать</button>
                    </div>
                    <div class="tariff-option popular" data-tariff="business" data-price="3900">
                        <div class="tariff-badge">Популярный</div>
                        <div class="tariff-option-name">Бизнес</div>
                        <div class="tariff-option-price">3 900 ₽<span>/мес</span></div>
                        <div class="tariff-option-desc">Для среднего бизнеса</div>
                        <button class="action-btn sm btn-full-width tariff-select-btn">Выбрать</button>
                    </div>
                    <div class="tariff-option" data-tariff="neuro" data-price="9900">
                        <div class="tariff-option-name">Нейро</div>
                        <div class="tariff-option-price">9 900 ₽<span>/мес</span></div>
                        <div class="tariff-option-desc">Для крупного бизнеса</div>
                        <button class="action-btn sm btn-full-width tariff-select-btn">Выбрать</button>
                    </div>
                </div>
                
                <div class="alert-buttons mt-15">
                    <button class="alert-btn alert-btn-secondary" id="tariffs-cancel">Закрыть</button>
                </div>
            </div>
        </div>
    </template>
    <template id="tmpl-prompt-alert">
        <div class="custom-alert-overlay">
            <div class="custom-alert">
                <div class="alert-icon-box success-bg">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </div>
                <h3 class="alert-title">Добавить телефон</h3>
                <p class="alert-text">Введите название для нового телефона</p>
                <div class="alert-input-wrapper mt-20">
                    <input type="text" class="hex-input-full" id="prompt-input" placeholder="Например: Отдел продаж" autocomplete="off" style="text-align: center; font-family: inherit;">
                </div>
                <div class="alert-buttons mt-25">
                    <button class="alert-btn alert-btn-secondary" id="prompt-cancel">Отмена</button>
                    <button class="alert-btn alert-btn-primary success-bg" id="prompt-confirm">Добавить</button>
                </div>
            </div>
        </div>
    </template>
    <template id="tmpl-assistant-create-alert">
        <div class="custom-alert-overlay">
            <div class="custom-alert">
                <div class="alert-icon-box success-bg">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </div>
                <h3 class="alert-title">Новый ассистент</h3>
                <p class="alert-text">Укажите имя и роль нового ассистента.</p>
                <div class="alert-input-wrapper mt-20">
                    <input type="text" class="hex-input-full assistant-create-input" id="assistant-create-name" placeholder="Например: Митя" autocomplete="off">
                </div>
                <div class="alert-input-wrapper mt-15">
                    <input type="text" class="hex-input-full assistant-create-input" id="assistant-create-role" placeholder="Например: AI-консультант" autocomplete="off">
                </div>
                <div class="alert-buttons mt-25">
                    <button class="alert-btn alert-btn-secondary" id="assistant-create-cancel">Отмена</button>
                    <button class="alert-btn alert-btn-primary success-bg" id="assistant-create-confirm">Создать</button>
                </div>
            </div>
        </div>
    </template>
</body>
</html>
