<!-- ОБЛАКО -->
<div class="bento-card" id="card-welcome-design">
    <div class="card-header-flex">
        <div class="card-title-group" onclick="window.toggleCardCollapse(this)">
            <div class="collapse-icon"></div>
            <h3 class="card-title">Облако</h3>
        </div>
        <!-- Иконки -->
        <div class="card-actions-mini">
            <button class="icon-btn-sm" onclick="window.resetWelcomeToDefault()" title="Восстановить дизайн">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>
            </button>
            <button class="icon-btn-sm" onclick="window.randomizeWelcomeDesign()" title="Магический дизайн">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2 12L9.5 9.5L12 2Z"/></svg>
            </button>
        </div>
    </div>
    <!-- Параметры облака -->
    <div class="settings-form">
        <!-- СТАТУС ОБЛАКА-->
        <div class="flex-between">
            <h3 class="subtitle-card-bold">Статус</h3>
        </div>
        <!-- Предпросмотр облака -->
        <div class="setting-item-compact">
            <div class="flex-between">
                <label class="subtitle-card">Предпросмотр</label>
                <label class="switch sm-switch">
                    <input type="checkbox" id="welcome-preview-toggle" data-setting="theme.welcome_preview_enabled">
                    <span class="slider round"></span>
                </label>
            </div>
        </div>
        <!-- Отображение облако на сайте -->
        <div class="setting-item-compact">
            <div class="flex-between">
                <label class="subtitle-card">Отображение на сайте</label>
                <label class="switch sm-switch">
                    <input type="checkbox" id="welcome-enabled-toggle" data-setting="theme.welcome_bubble_enabled">
                    <span class="slider round"></span>
                </label>
            </div>
        </div>
        <!-- Задержка появления облака -->
        <div class="setting-item">
            <label class="subtitle-card">Задержка появления</label>
            <div class="range-with-val">
                <input type="range" id="welcome-delay-input" spellcheck="false" class="range-input" data-setting="theme.welcome_trigger_delay_ms" min="0" max="60">
                <span class="range-value" id="welcome-delay-val"></span>
            </div>
        </div>
        <!-- Повторный показ облака -->
        <div class="setting-item">
            <label class="subtitle-card">Повторный показ</label>
            <div class="range-with-val">
                <input type="range" id="welcome-retry-delay-input" spellcheck="false" class="range-input" data-setting="theme.welcome_retry_delay_sec" min="10" max="600" step="10">
                <span class="range-value" id="welcome-retry-delay-val"></span>
            </div>
        </div>
        <!-- Количество показов облака -->
        <div class="setting-item">
            <label class="subtitle-card">Количество показов</label>
            <div class="range-with-val">
                <input type="range" id="welcome-retry-count-input" spellcheck="false" class="range-input" data-setting="theme.welcome_retry_count" min="0" max="20">
                <span class="range-value" id="welcome-retry-count-val"></span>
            </div>
        </div>
        <!-- ГЕОМЕТРИЯ ОБЛАКА -->
        <div class="flex-between">
            <h3 class="subtitle-card-bold">Геометрия</h3>
        </div>
        <!-- Ширина облака -->
        <div class="setting-item">
            <label class="subtitle-card">Ширина</label>
            <div class="range-with-val">
                <input type="range" id="welcome-width-input" data-setting="theme.welcome_max_width" min="50" max="280" class="range-input">
                <span class="range-value" id="welcome-width-val"></span>
            </div>
        </div>
        <!-- Высота облака -->
        <div class="setting-item">
            <label class="subtitle-card">Высота</label>
            <div class="range-with-val">
                <input type="range" id="welcome-height-input" data-setting="theme.welcome_height" min="35" max="280" class="range-input">
                <span class="range-value" id="welcome-height-val"></span>
            </div>
        </div>
        <!-- Скругление облака -->
        <div class="setting-item">
            <label class="subtitle-card">Скругление</label>
            <div class="range-with-val">
                <input type="range" id="welcome-radius-input" spellcheck="false" class="range-input" data-setting="theme.welcome_radius" min="0" max="40">
                <span class="range-value" id="welcome-radius-val"></span>
            </div>
        </div>
        <!-- ДЕЙСТВИЕ ПРИ КЛИКЕ НА ОБЛАКО -->
        <div class="flex-between">
            <h3 class="subtitle-card-bold">Действие</h3>
        </div>
        <!-- Параметры действия при клике на облако -->
        <div class="settings-form-mini">
            <!-- Открыть при клике -->
            <div class="setting-item-compact">
                <label class="subtitle-card">Открыть при клике</label>
                <div class="side-selector" id="welcome-action-switcher">
                    <button class="welcome-action-btn active" data-action-val="chat">Чат</button>
                    <button class="welcome-action-btn" data-action-val="link">Ссылку</button>
                </div>
            </div>
            <!-- URL ссылка облака -->
            <div class="setting-item-compact" id="welcome-link-url-item">
                <label class="subtitle-card">URL ссылка</label>
                <input type="text" id="welcome-link-url-input" spellcheck="false" class="hex-input-full" data-setting="theme.welcome_link_url" placeholder="https://mitia.pro">
            </div>
            <!-- Открыть ссылку в новом окне -->
            <div class="setting-item-compact" id="welcome-link-target-item">
                <div class="flex-between">
                    <label class="subtitle-card">Открыть ссылку в новом окне</label>
                    <label class="switch sm-switch">
                        <input type="checkbox" id="welcome-link-target-toggle" data-setting="theme.welcome_click_target_blank">
                        <span class="slider round"></span>
                    </label>
                </div>
            </div>
        </div>
        <!-- ТЕКСТ ОБЛАКА -->
            <div class="setting-item">
            <div class="flex-between">
                <h3 class="subtitle-card-bold">Текст</h3>
                <label class="switch sm-switch">
                    <input type="checkbox" id="welcome-text-toggle" data-setting="theme.welcome_text_enabled">
                    <span class="slider round"></span>
                </label>
            </div>

            <!-- Параметры текста облака -->
            <div id="welcome-content-group" class="settings-form-mini">
                <!-- Фраза в облаке -->
                <div class="setting-item">
                    <div class="flex-between">
                        <label class="subtitle-card">Фраза</label>
                        <span class="char-counter" id="welcome-text-counter">0 / 200</span>
                    </div>
                    <textarea id="welcome-bubble-text-input" spellcheck="false" class="hex-input-full" data-setting="theme.welcome_bubble_text" maxlength="200" placeholder="Например: Нужна помощь? Я на связи!"></textarea>
                </div>
                <!-- Шрифт текста облака -->
                <div class="setting-item">
                    <label class="subtitle-card">Шрифт</label>
                <div class="custom-select" id="welcome-font-family-select-container">
                    <div class="select-trigger">
                        <span id="welcome-current-font-name">Geist</span>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"></polyline></svg>
                    </div>
                    <div class="select-options">
                        <!-- Заполняется динамически через FontManager -->
                    </div>
                </div>
                    <input type="hidden" id="welcome-font-family-select" data-setting="theme.welcome_font_family">
                </div>
                <!-- Цвет текста облака -->
                <div class="setting-item">
                    <label class="subtitle-card">Цвет</label>
                    <div class="color-input-group">
                        <div class="color-circle-wrapper">
                            <div class="color-circle-bg" id="welcome-text-preview"></div>
                            <input type="color" id="welcome-text-picker" class="hidden-picker">
                        </div>
                        <input type="text" id="welcome-text-hex" spellcheck="false" class="color_hex hex-input-full" data-setting="theme.welcome_text_color" placeholder="Прозрачный">
                    </div>
                </div>
                <!-- Прозрачность текста облака -->
                <div class="setting-item">
                    <label class="subtitle-card">Прозрачность</label>
                    <div class="range-with-val">
                        <input type="range" id="welcome-text-opacity-input" spellcheck="false" class="range-input" data-setting="theme.welcome_text_opacity" min="0" max="100">
                        <span class="range-value" id="welcome-text-opacity-val"></span>
                    </div>
                </div>
                <!-- Размер текста облака -->
                <div class="setting-item">
                    <label class="subtitle-card">Размер</label>
                    <div class="range-with-val">
                        <input type="range" id="welcome-font-size-input" spellcheck="false" class="range-input" data-setting="theme.welcome_font_size" min="10" max="24">
                        <span class="range-value" id="welcome-font-size-val"></span>
                    </div>
                </div>
                <!-- Толщина текста облака -->
                <div class="setting-item">
                    <label class="subtitle-card">Толщина</label>
                    <div class="range-with-val">
                        <input type="range" id="welcome-font-weight-input" data-setting="theme.welcome_font_weight" min="300" max="900" step="100" class="range-input">
                        <span class="range-value" id="welcome-font-weight-val"></span>
                    </div>
                </div>
                <!-- Выравнивание текста облака -->
                <div class="setting-item">
                    <label class="subtitle-card">Выравнивание по горизонтали</label>
                    <div class="type-switcher" id="welcome-text-align-switcher">
                        <button class="type-btn active" data-align-val="left" title="По левому краю">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="17" y1="10" x2="3" y2="10"></line><line x1="21" y1="6" x2="3" y2="6"></line><line x1="21" y1="14" x2="3" y2="14"></line><line x1="17" y1="18" x2="3" y2="18"></line></svg>
                        </button>
                        <button class="type-btn" data-align-val="center" title="По центру">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="10" x2="6" y2="10"></line><line x1="21" y1="6" x2="3" y2="6"></line><line x1="21" y1="14" x2="3" y2="14"></line><line x1="18" y1="18" x2="6" y2="18"></line></svg>
                        </button>
                        <button class="type-btn" data-align-val="right" title="По правому краю">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="21" y1="10" x2="7" y2="10"></line><line x1="21" y1="6" x2="3" y2="6"></line><line x1="21" y1="14" x2="3" y2="14"></line><line x1="21" y1="18" x2="7" y2="18"></line></svg>
                        </button>
                    </div>
                    <input type="hidden" id="welcome-text-align-input" data-setting="theme.welcome_text_align">
                </div>
                <!-- Вертикальное выравнивание текста облака -->
                <div class="setting-item">
                    <label class="subtitle-card">Вертикальное по вертикали</label>
                    <div class="type-switcher" id="welcome-text-valign-switcher">
                        <button class="type-btn" data-valign-val="flex-start" title="Сверху">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="4" y1="6" x2="20" y2="6"></line><line x1="4" y1="10" x2="14" y2="10"></line></svg>
                        </button>
                        <button class="type-btn active" data-valign-val="center" title="По центру">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="4" y1="10" x2="20" y2="10"></line><line x1="4" y1="14" x2="20" y2="14"></line></svg>
                        </button>
                        <button class="type-btn" data-valign-val="flex-end" title="Снизу">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="4" y1="18" x2="20" y2="18"></line><line x1="10" y1="14" x2="20" y2="14"></line></svg>
                        </button>
                    </div>
                    <input type="hidden" id="welcome-text-valign-input" data-setting="theme.welcome_text_valign">
                </div>
            </div>
        </div>
        <!-- ИЗОБРАЖЕНИЕ ОБЛАКА -->
        <div class="flex-between">
            <h3 class="subtitle-card-bold">Изображение</h3>
            <label class="switch sm-switch">
                <input type="checkbox" id="welcome-img-enabled-toggle" data-setting="theme.welcome_img_enabled">
                <span class="slider round"></span>
            </label>
        </div>
        <!-- Параметры изображения облака -->
        <div id="welcome-img-settings-group" class="settings-form-mini">
            <!-- Загрузить изображение облака -->
            <div class="setting-item">
                <label class="subtitle-card">Загрузить изображение</label>
                <div class="color-input-group">
                    <div id="welcome-img-preview" class="img-upload-preview" onclick="document.getElementById('welcome-img-upload').click()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="placeholder-icon"><circle cx="12" cy="12" r="1"></circle><circle cx="19" cy="12" r="1"></circle><circle cx="5" cy="12" r="1"></circle></svg>
                        <button id="welcome-img-remove-btn" class="avatar-remove-btn" style="display: none;" onclick="event.stopPropagation(); window.removeWelcomeImage()">
                            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                                <line x1="18" y1="6" x2="6" y2="18"></line>
                                <line x1="6" y1="6" x2="18" y2="18"></line>
                            </svg>
                        </button>
                    </div>
                    <div class="upload-info">
                        <span class="upload-hint">JPG, PNG, SVG, GIF, WEBP. Макс. вес: 500 KB</span>
                    </div>
                    <input type="file" id="welcome-img-upload" hidden accept=".jpg,.jpeg,.png,.svg,.gif,.webp">
                </div>
            </div>
            <!-- Прозрачность изображения облака -->
            <div class="setting-item">
                <label class="subtitle-card">Прозрачность</label>
                <div class="range-with-val">
                    <input type="range" id="welcome-img-opacity-input" spellcheck="false" class="range-input" data-setting="theme.welcome_img_opacity" min="0" max="100">
                    <span class="range-value" id="welcome-img-opacity-val"></span>
                </div>
            </div>
        </div>
        <!-- ФОН ОБЛАКА -->
        <div class="flex-between">
            <h3 class="subtitle-card-bold">Фон</h3>
            <label class="switch sm-switch">
                <input type="checkbox" id="welcome-bg-toggle" data-setting="theme.welcome_bg_enabled">
                <span class="slider round"></span>
            </label>
        </div>
        <!-- Параметры фона облака-->
        <div id="welcome-bg-group" class="settings-form-mini">
            <!-- Цвет фона облака -->
            <div class="setting-item">
                <label class="subtitle-card">Цвет</label>
                <div class="color-input-group">
                    <div class="color-circle-wrapper">
                        <div class="color-circle-bg" id="welcome-bg-preview"></div>
                        <input type="color" id="welcome-bg-picker" class="hidden-picker">
                    </div>
                    <input type="text" id="welcome-bg-hex" spellcheck="false" class="color_hex hex-input-full" data-setting="theme.welcome_bg" placeholder="Прозрачный">
                </div>
            </div>
            <!-- Прозрачность фона облака -->
            <div class="setting-item">
                <label class="subtitle-card">Прозрачность</label>
                <div class="range-with-val">
                    <input type="range" id="welcome-opacity-input" spellcheck="false" class="range-input" data-setting="theme.welcome_bg_opacity" min="0" max="100">
                    <span class="range-value" id="welcome-opacity-val"></span>
                </div>
            </div>
            <!-- Размытие фона облака -->
            <div class="setting-item">
                <label class="subtitle-card">Размытие</label>
                <div class="range-with-val">
                    <input type="range" id="welcome-blur-input" spellcheck="false" class="range-input" data-setting="theme.welcome_bg_blur" min="0" max="20">
                    <span class="range-value" id="welcome-blur-val"></span>
                </div>
            </div>
        </div>
        <!-- ОБВОДКА ОБЛАКА -->
        <div class="flex-between">
            <h3 class="subtitle-card-bold">Обводка</h3>
            <label class="switch sm-switch">
                <input type="checkbox" id="welcome-border-toggle" data-setting="theme.welcome_border_enabled">
                <span class="slider round"></span>
            </label>
        </div>
        <!-- Параметры обводки облака -->
        <div id="welcome-border-group" class="settings-form-mini">
            <!-- Цвет обводки облака -->
            <div class="setting-item">
                <label class="subtitle-card">Цвет</label>
                <div class="color-input-group">
                    <div class="color-circle-wrapper">
                        <div class="color-circle-bg" id="welcome-border-preview"></div>
                        <input type="color" id="welcome-border-picker" class="hidden-picker">
                    </div>
                    <input type="text" id="welcome-border-hex" spellcheck="false" class="color_hex hex-input-full" data-setting="theme.welcome_border" placeholder="Прозрачный">
                </div>
            </div>
            <!-- Прозрачность обводки облака -->
            <div class="setting-item">
                <label class="subtitle-card">Прозрачность</label>
                <div class="range-with-val">
                    <input type="range" id="welcome-border-opacity-input" spellcheck="false" class="range-input" data-setting="theme.welcome_border_opacity" min="0" max="100">
                    <span class="range-value" id="welcome-border-opacity-val"></span>
                </div>
            </div>
            <!-- Толщина обводки облака -->
            <div class="setting-item">
                <label class="subtitle-card">Толщина</label>
                <div class="range-with-val">
                    <input type="range" id="welcome-border-width-input" data-setting="theme.welcome_border_width" min="0" max="10"class="range-input">
                    <span class="range-value" id="welcome-border-width-val"></span>
                </div>
            </div>
        </div>
        <!-- ТЕНЬ ОБЛАКА -->
        <div class="flex-between">
            <h3 class="subtitle-card-bold">Тень</h3>
            <label class="switch sm-switch">
                <input type="checkbox" id="welcome-shadow-toggle" data-setting="theme.welcome_shadow_enabled">
                <span class="slider round"></span>
            </label>
        </div>
        <!-- Параметры тени облака -->
        <div id="welcome-shadow-group" class="settings-form-mini">
            <!-- Цвет тени облака -->
            <div class="setting-item">
                <label class="subtitle-card">Цвет</label>
                <div class="color-input-group">
                    <div class="color-circle-wrapper">
                        <div class="color-circle-bg" id="welcome-shadow-preview"></div>
                        <input type="color" id="welcome-shadow-picker" class="hidden-picker">
                    </div>
                    <input type="text" id="welcome-shadow-hex" spellcheck="false" class="color_hex hex-input-full" data-setting="theme.welcome_shadow_color" placeholder="Прозрачный">
                </div>
            </div>
            <!-- Прозрачность тени облака -->
            <div class="setting-item">
                <label class="subtitle-card">Прозрачность</label>
                <div class="range-with-val">
                    <input type="range" id="welcome-shadow-opacity-input" spellcheck="false" class="range-input" data-setting="theme.welcome_shadow_opacity" min="0" max="100">
                    <span class="range-value" id="welcome-shadow-opacity-val"></span>
                </div>
            </div>
            <!-- Размытие тени облака -->
            <div class="setting-item">
                <label class="subtitle-card">Размытие</label>
                <div class="range-with-val">
                    <input type="range" id="welcome-shadow-blur-input" spellcheck="false" class="range-input" data-setting="theme.welcome_shadow_blur" min="0" max="100">
                    <span class="range-value" id="welcome-shadow-blur-val"></span>
                </div>
            </div>
        </div>
    </div>
</div>
