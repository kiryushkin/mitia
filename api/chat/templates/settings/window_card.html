<div class="bento-card" id="card-window-design">
    <div class="card-header-flex">
        <div class="card-title-group">
            <h3 class="card-title">Окно</h3>
        </div>
        <div class="card-actions-mini">
            <button class="menu-dots-btn" onclick="window.resetWindowToDefault()" title="Восстановить дизайн">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>
            </button>
            <button class="menu-dots-btn" onclick="window.randomizeWindowDesign()" title="Магический дизайн">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2 12L9.5 9.5L12 2Z"/></svg>
            </button>
            <button class="icon-btn-sm window-collapse-btn" onclick="window.toggleCardCollapse(this)" title="Свернуть/развернуть карточку" aria-label="Свернуть/развернуть карточку">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
            </button>
        </div>
    </div>
    <p class="card-description">Диалоговое окно чата</p>
    <div class="settings-form">
        <div class="flex-between">
            <h3 class="subtitle-card-bold white">Статус</h3>
        </div>
        <div class="setting-item-compact">
            <div class="flex-between">
                <label class="subtitle-card">Автоматически открывать при загрузке</label>
                <label class="switch sm-switch">
                    <input type="checkbox" id="chat-auto-open-toggle" data-setting="theme.window_auto_open">
                    <span class="slider round"></span>
                </label>
            </div>
        </div>
        <div class="setting-item-compact">
            <div class="flex-between">
                <label class="subtitle-card">Перемещение по экрану</label>
                <label class="switch sm-switch">
                    <input type="checkbox" id="chat-draggable-toggle" data-setting="theme.window_draggable">
                    <span class="slider round"></span>
                </label>
            </div>
        </div>
        <div class="flex-between">
            <h3 class="subtitle-card-bold white">Геометрия</h3>
        </div>
        <div class="setting-item-compact">
            <div class="flex-between">
                <label class="subtitle-card">Открывать на весь экран при открытии</label>
                <label class="switch sm-switch">
                    <input type="checkbox" id="chat-expand-default-toggle" data-setting="theme.window_expand_default">
                    <span class="slider round"></span>
                </label>
            </div>
        </div>
        <div class="setting-item-compact">
            <div class="flex-between">
                <label class="subtitle-card">Разрешить изменение размера</label>
                <label class="switch sm-switch">
                    <input type="checkbox" id="chat-resizable-toggle" data-setting="theme.window_resizable">
                    <span class="slider round"></span>
                </label>
            </div>
        </div>
        <div class="setting-item">
            <label class="subtitle-card">Ширина</label>
            <div class="range-with-val">
                <input type="range" id="chat-width-input" data-setting="theme.window_width" min="20" max="100" class="range-input">
                <span class="range-value" id="chat-width-val"></span>
            </div>
        </div>
        <div class="setting-item"> 
            <label class="subtitle-card">Высота</label>
            <div class="range-with-val">
                <input type="range" id="chat-height-input" data-setting="theme.window_height" min="20" max="100" class="range-input">
                <span class="range-value" id="chat-height-val"></span>
            </div>
        </div>
        <div class="setting-item">
            <label class="subtitle-card">Позиция по горизонтали</label>
            <div class="range-with-val">
                <input type="range" id="chat-left-input" data-setting="theme.window_left" min="0" max="100" class="range-input">
                <span class="range-value" id="chat-left-val"></span>
            </div>
        </div>
        <div class="setting-item">
            <label class="subtitle-card">Позиция по вертикали</label>
            <div class="range-with-val">
                <input type="range" id="chat-top-input" data-setting="theme.window_top" min="0" max="100" class="range-input">
                <span class="range-value" id="chat-top-val"></span>
            </div>
        </div>
        <div class="setting-item">
            <label class="subtitle-card">Скругление</label>
            <div class="range-with-val">
                <input type="range" id="chat-radius-input" spellcheck="false" class="range-input" data-setting="theme.window_radius" min="0" max="50">
                <span class="range-value" id="chat-radius-val"></span>
            </div>
        </div>
        <div class="flex-between">
            <h3 class="subtitle-card-bold">Изображение</h3>
            <label class="switch sm-switch">
                <input type="checkbox" id="chat-window-img-enabled-toggle" data-setting="theme.window_bg_img_enabled">
                <span class="slider round"></span>
            </label>
        </div>
        <div id="chat-window-img-group" class="settings-form-mini">
            <div class="setting-item">
                <label class="subtitle-card">Загрузить изображение</label>
                <div class="color-input-group">
                    <div id="chat-window-img-preview" class="img-upload-preview" onclick="document.getElementById('chat-window-img-upload').click()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="placeholder-icon"><circle cx="12" cy="12" r="1"></circle><circle cx="19" cy="12" r="1"></circle><circle cx="5" cy="12" r="1"></circle></svg>
                        <button id="chat-window-img-remove-btn" class="avatar-remove-btn" style="display: none;" onclick="event.stopPropagation(); window.removeChatWindowImage()">
                            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                                <line x1="18" y1="6" x2="6" y2="18"></line>
                                <line x1="6" y1="6" x2="18" y2="18"></line>
                            </svg>
                        </button>
                    </div>
                    <div class="upload-info">
                        <span class="upload-hint">JPG, PNG, SVG, GIF, WEBP. Макс. вес: 500 KB</span>
                    </div>
                    <input type="file" id="chat-window-img-upload" hidden accept=".jpg,.jpeg,.png,.svg,.gif,.webp">
                </div>
            </div>
            <div class="setting-item">
                <label class="subtitle-card">Прозрачность</label>
                <div class="range-with-val">
                    <input type="range" id="chat-window-img-opacity-input" data-setting="theme.window_bg_img_opacity" min="0" max="100" class="range-input">
                    <span class="range-value" id="chat-window-img-opacity-val"></span>
                </div>
            </div>
        </div>
        <div class="flex-between">
            <h3 class="subtitle-card-bold">Фон</h3>
            <label class="switch sm-switch">
                <input type="checkbox" id="chat-bg-toggle" data-setting="theme.window_bg_enabled">
                <span class="slider round"></span>
            </label>
        </div>
        <div id="chat-bg-group" class="settings-form-mini">
            <div class="setting-item">
                <label class="subtitle-card">Цвет</label>
                <div class="color-input-group">
                    <div class="color-circle-wrapper">
                        <div class="color-circle-bg" id="chat-bg-preview"></div>
                        <input type="color" id="chat-bg-picker" class="hidden-picker">
                    </div>
                    <input type="text" id="chat-bg-hex" spellcheck="false" class="color_hex hex-input-full" data-setting="theme.window_bg" placeholder="Прозрачный">
                </div>
            </div>
            <div class="setting-item">
                <label class="subtitle-card">Прозрачность</label>
                <div class="range-with-val">
                    <input type="range" id="chat-opacity-input" spellcheck="false" class="range-input" data-setting="theme.window_bg_opacity" min="0" max="100">
                    <span class="range-value" id="chat-opacity-val"></span>
                </div>
            </div>
            <div class="setting-item">
                <label class="subtitle-card">Размытие</label>
                <div class="range-with-val">
                    <input type="range" id="chat-blur-input" spellcheck="false" class="range-input" data-setting="theme.window_bg_blur" min="0" max="50">
                    <span class="range-value" id="chat-blur-val"></span>
                </div>
            </div>
        </div>
        <div class="flex-between">
            <h3 class="subtitle-card-bold">Обводка</h3>
            <label class="switch sm-switch">
                <input type="checkbox" id="chat-border-toggle" data-setting="theme.window_border_enabled">
                <span class="slider round"></span>
            </label>
        </div>
        <div id="chat-border-group" class="settings-form-mini">
            <div class="setting-item">
                <label class="subtitle-card">Цвет</label>
                <div class="color-input-group">
                    <div class="color-circle-wrapper">
                        <div class="color-circle-bg" id="chat-border-preview"></div>
                        <input type="color" id="chat-border-picker" class="hidden-picker">
                    </div>
                    <input type="text" id="chat-border-hex" spellcheck="false" class="color_hex hex-input-full" data-setting="theme.window_border_color" placeholder="Прозрачный">
                </div>
            </div>
            <div class="setting-item">
                <label class="subtitle-card">Прозрачность</label>
                <div class="range-with-val">
                    <input type="range" id="chat-border-opacity-input" spellcheck="false" class="range-input" data-setting="theme.window_border_opacity" min="0" max="100">
                    <span class="range-value" id="chat-border-opacity-val"></span>
                </div>
            </div>
            <div class="setting-item">
                <label class="subtitle-card">Толщина</label>
                <div class="range-with-val">
                    <input type="range" id="chat-border-width-input" data-setting="theme.window_border_width" min="0" max="10" class="range-input">
                    <span class="range-value" id="chat-border-width-val"></span>
                </div>
            </div>
        </div>
        <div class="flex-between">
            <h3 class="subtitle-card-bold white">Тень</h3>
            <label class="switch sm-switch">
                <input type="checkbox" id="chat-shadow-toggle" data-setting="theme.window_shadow_enabled">
                <span class="slider round"></span>
            </label>
        </div>
        <div id="chat-shadow-settings" class="settings-form-mini">
            <div class="setting-item">
                <label class="subtitle-card">Цвет</label>
                <div class="color-input-group">
                    <div class="color-circle-wrapper">
                        <div class="color-circle-bg" id="chat-shadow-preview"></div>
                        <input type="color" id="chat-shadow-picker" class="hidden-picker">
                    </div>
                    <input type="text" id="chat-shadow-hex" spellcheck="false" class="color_hex hex-input-full" data-setting="theme.window_shadow_color" placeholder="Прозрачный">
                </div>
            </div>
            <div class="setting-item">
                <label class="subtitle-card">Прозрачность</label>
                <div class="range-with-val">
                    <input type="range" id="chat-shadow-opacity-input" spellcheck="false" class="range-input" data-setting="theme.window_shadow_opacity" min="0" max="100">
                    <span class="range-value" id="chat-shadow-opacity-val"></span>
                </div>
            </div>
            <div class="setting-item">
                <label class="subtitle-card">Размытие</label>
                <div class="range-with-val">
                    <input type="range" id="chat-shadow-blur-input" spellcheck="false" class="range-input" data-setting="theme.window_shadow_blur" min="0" max="150">
                    <span class="range-value" id="chat-shadow-blur-val"></span>
                </div>
            </div>
        </div>
    </div>
</div>
