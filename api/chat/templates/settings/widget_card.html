<div class="bento-card" id="card-widget-design">
    <div class="card-header-flex">
        <div class="card-title-group">
            <h3 class="card-title">Виджет</h3>
        </div>
        <div class="card-actions-mini">
            <button class="menu-dots-btn" onclick="window.resetWidgetToDefault()" title="Восстановить дизайн">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>
            </button>
            <button class="menu-dots-btn" onclick="window.randomizeWidgetDesign()" title="Магический дизайн">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2 12L9.5 9.5L12 2Z"/></svg>
            </button>
            <button class="icon-btn-sm widget-collapse-btn" onclick="window.toggleCardCollapse(this)" title="Свернуть/развернуть карточку" aria-label="Свернуть/развернуть карточку">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
            </button>
        </div>
    </div>
    <p class="card-description">Открытие диалогового окна</p>
    <div class="settings-form">
        <div class="flex-between">
            <h3 class="subtitle-card-bold">Статус</h3>
        </div>
        <div class="setting-item-compact">
            <div class="flex-between">
                <label class="subtitle-card">Перемещение по экрану</label>
                <label class="switch sm-switch">
                    <input type="checkbox" id="widget-draggable-toggle" data-setting="theme.widget_draggable">
                    <span class="slider round"></span>
                </label>
            </div>
        </div>
        <div class="flex-between">
            <h3 class="subtitle-card-bold">Геометрия</h3>
        </div>
        <div id="widget-geometry-settings-group" class="settings-form-mini">
            <div class="setting-item">
                <label class="subtitle-card">Размер</label>
                <div class="range-with-val">
                    <input type="range" id="widget-size-input" data-setting="theme.widget_size" min="20" max="120" class="range-input">
                    <span class="range-value" id="widget-size-val"></span>
                </div>
            </div>
            <div class="setting-item">
                <label class="subtitle-card">Позиция по вертикали</label>
                <div class="range-with-val">
                    <input type="range" id="widget-top-input" data-setting="theme.widget_top" min="0" max="100" class="range-input">
                    <span class="range-value" id="widget-top-val"></span>
                </div>
            </div>
            <div class="setting-item">
                <label class="subtitle-card">Позиция по горизонтали</label>
                <div class="range-with-val">
                    <input type="range" id="widget-left-input" data-setting="theme.widget_left" min="0" max="100" class="range-input">
                    <span class="range-value" id="widget-left-val"></span>
                </div>
            </div>
            <div class="setting-item">
                <label class="subtitle-card">Скругление</label>
                <div class="range-with-val">
                    <input type="range" id="widget-radius-input" data-setting="theme.widget_radius" min="0" max="50" class="range-input">
                    <span class="range-value" id="widget-radius-val"></span>
                </div>
            </div>
        </div>
        <div class="flex-between">
            <h3 class="subtitle-card-bold">Изображение</h3>
            <label class="switch sm-switch">
                <input type="checkbox" id="widget-img-enabled-toggle" data-setting="theme.widget_img_enabled">
                <span class="slider round"></span>
            </label>
        </div>
        <div id="widget-img-settings-group" class="settings-form-mini">
            <div class="setting-item">
                <label class="subtitle-card">Загрузить изображение</label>
                <div class="color-input-group">
                    <div id="widget-img-preview" class="img-upload-preview" onclick="document.getElementById('widget-img-upload').click()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="placeholder-icon"><circle cx="12" cy="12" r="1"></circle><circle cx="19" cy="12" r="1"></circle><circle cx="5" cy="12" r="1"></circle></svg>
                        <button id="widget-img-remove-btn" class="avatar-remove-btn" style="display: none;" onclick="event.stopPropagation(); window.removeWidgetImage()">
                            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                                <line x1="18" y1="6" x2="6" y2="18"></line>
                                <line x1="6" y1="6" x2="18" y2="18"></line>
                            </svg>
                        </button>
                    </div>
                    <div class="upload-info">
                        <span class="upload-hint">JPG, PNG, SVG, GIF, WEBP. Макс. вес: 500 KB</span>
                    </div>
                    <input type="file" id="widget-img-upload" hidden accept=".jpg,.jpeg,.png,.svg,.gif,.webp">
                </div>
            </div>
            <div class="setting-item">
                <label class="subtitle-card">Прозрачность</label>
                <div class="range-with-val">
                    <input type="range" id="widget-img-opacity-input" data-setting="theme.widget_img_opacity" min="0" max="100" class="range-input">
                    <span class="range-value" id="widget-img-opacity-val"></span>
                </div>
            </div>
        </div>
        <div class="flex-between">
            <h3 class="subtitle-card-bold">Фон</h3>
            <label class="switch sm-switch">
                <input type="checkbox" id="widget-bg-toggle" data-setting="theme.widget_bg_enabled">
                <span class="slider round"></span>
            </label>
        </div>
        <div id="widget-bg-settings-group" class="settings-form-mini">
            <div class="setting-item">
                <label class="subtitle-card">Цвет</label>
                <div class="color-input-group">
                    <div class="color-circle-wrapper">
                        <div class="color-circle-bg" id="brand-color-preview"></div>
                        <input type="color" id="brand-color-picker" class="hidden-picker">
                    </div>
                    <input type="text" id="brand-color-hex" spellcheck="false" class="color_hex hex-input-full" data-setting="theme.widget_bg_color" placeholder="Прозрачный">
                </div>
            </div>
            <div class="setting-item">
                <label class="subtitle-card">Прозрачность</label>
                <div class="range-with-val">
                    <input type="range" id="brand-opacity-input" data-setting="theme.widget_bg_opacity" min="0" max="100" class="range-input">
                    <span class="range-value" id="brand-opacity-val"></span>
                </div>
            </div>
            <div class="setting-item">
                <label class="subtitle-card">Размытие</label>
                <div class="range-with-val">
                    <input type="range" id="brand-blur-input" data-setting="theme.widget_bg_blur" min="0" max="20" class="range-input">
                    <span class="range-value" id="brand-blur-val"></span>
                </div>
            </div>
        </div>
        <div class="flex-between">
            <h3 class="subtitle-card-bold">Обводка</h3>
            <label class="switch sm-switch">
                <input type="checkbox" id="widget-border-toggle" data-setting="theme.widget_border_enabled">
                <span class="slider round"></span>
            </label>
        </div>
        <div id="widget-border-settings-group" class="settings-form-mini">
            <div class="setting-item">
                <label class="subtitle-card">Цвет</label>
                <div class="color-input-group">
                    <div class="color-circle-wrapper">
                        <div class="color-circle-bg" id="brand-border-preview"></div>
                        <input type="color" id="brand-border-picker" class="hidden-picker">
                    </div>
                    <input type="text" id="brand-border-hex" spellcheck="false" class="color_hex hex-input-full" data-setting="theme.widget_border_color" placeholder="Прозрачный">
                </div>
            </div>
            <div class="setting-item">
                <label class="subtitle-card">Прозрачность</label>
                <div class="range-with-val">
                    <input type="range" id="brand-border-opacity-input" data-setting="theme.widget_border_opacity" min="0" max="100" class="range-input">
                    <span class="range-value" id="brand-border-opacity-val"></span>
                </div>
            </div>
            <div class="setting-item">
                <label class="subtitle-card">Толщина</label>
                <div class="range-with-val">
                    <input type="range" id="brand-border-width-input" data-setting="theme.widget_border_width" min="0" max="10" class="range-input">
                    <span class="range-value" id="brand-border-width-val"></span>
                </div>
            </div>
        </div>
        <div class="flex-between">
            <h3 class="subtitle-card-bold">Тень</h3>
            <label class="switch sm-switch">
                <input type="checkbox" id="widget-shadow-toggle" data-setting="theme.widget_shadow_enabled">
                <span class="slider round"></span>
            </label>
        </div>
        <div id="shadow-settings-group" class="settings-form-mini">
            <div class="setting-item">
                <label class="subtitle-card">Цвет</label>
                <div class="color-input-group">
                    <div class="color-circle-wrapper">
                        <div class="color-circle-bg" id="shadow-color-preview"></div>
                        <input type="color" id="shadow-color-picker" class="hidden-picker">
                    </div>
                    <input type="text" id="shadow-color-hex" spellcheck="false" class="color_hex hex-input-full" data-setting="theme.widget_shadow_color" placeholder="Прозрачный">
                </div>
            </div>
            <div class="setting-item">
                <label class="subtitle-card">Прозрачность</label>
                <div class="range-with-val">
                    <input type="range" id="shadow-opacity-input" data-setting="theme.widget_shadow_opacity" min="0" max="100" class="range-input">
                    <span class="range-value" id="shadow-opacity-val"></span>
                </div>
            </div>
            <div class="setting-item">
                <label class="subtitle-card">Размытие</label>
                <div class="range-with-val">
                    <input type="range" id="shadow-blur-input" data-setting="theme.widget_shadow_blur" min="0" max="100" class="range-input">
                    <span class="range-value" id="shadow-blur-val"></span>
                </div>
            </div>
        </div>
        <div class="flex-between">
            <h3 class="subtitle-card-bold">Эффекты</h3>
            <label class="switch sm-switch">
                <input type="checkbox" id="widget-effects-toggle" data-setting="theme.widget_effects_enabled">
                <span class="slider round"></span>
            </label>
        </div>
        <div id="widget-effects-group" class="settings-form-mini">
            <div class="flex-between">
                <h3 class="subtitle-card-bold-muted">Точки</h3>
                <label class="switch sm-switch">
                    <input type="checkbox" id="widget-dots-toggle" data-setting="theme.widget_dots_enabled">
                    <span class="slider round"></span>
                </label>
            </div>
            <div id="dots-settings-group" class="settings-form-mini">
                <div class="setting-item">
                    <label class="subtitle-card">Цвет</label>
                    <div class="color-input-group">
                        <div class="color-circle-wrapper">
                            <div class="color-circle-bg" id="icon-color-preview"></div>
                            <input type="color" id="icon-color-picker" class="hidden-picker">
                        </div>
                        <input type="text" id="icon-color-hex" spellcheck="false" class="color_hex hex-input-full" data-setting="theme.widget_dots_color" placeholder="Прозрачный">
                    </div>
                </div>
                <div class="setting-item">
                    <label class="subtitle-card">Прозрачность</label>
                    <div class="range-with-val">
                        <input type="range" id="widget-dots-opacity-input" data-setting="theme.widget_dots_opacity" min="0" max="100" class="range-input">
                        <span class="range-value" id="widget-dots-opacity-val"></span>
                    </div>
                </div>
            </div>
            <div class="flex-between-compact">
                <h3 class="subtitle-card-bold-muted">Пульсация</h3>
                <label class="switch sm-switch">
                    <input type="checkbox" id="widget-pulse-toggle" data-setting="theme.widget_pulse_enabled">
                    <span class="slider round"></span>
                </label>
            </div>
            <div id="pulse-settings-group" class="settings-form-mini">
                <div class="setting-item">
                    <label class="subtitle-card">Цвет</label>
                    <div class="color-input-group">
                        <div class="color-circle-wrapper">
                            <div class="color-circle-bg" id="pulse-color-preview"></div>
                            <input type="color" id="pulse-color-picker" class="hidden-picker">
                        </div>
                        <input type="text" id="pulse-color-hex" spellcheck="false" class="color_hex hex-input-full" data-setting="theme.widget_pulse_color" placeholder="Прозрачный">
                    </div>
                </div>
                <div class="setting-item">
                    <label class="subtitle-card">Прозрачность</label>
                    <div class="range-with-val">
                        <input type="range" id="pulse-opacity-input" data-setting="theme.widget_pulse_opacity" min="0" max="100" class="range-input">
                        <span class="range-value" id="pulse-opacity-val"></span>
                    </div>
                </div>
                <div class="setting-item">
                    <label class="subtitle-card">Размер</label>
                    <div class="range-with-val">
                        <input type="range" id="pulse-size-input" data-setting="theme.widget_pulse_size" min="1" max="3" step="0.1" class="range-input">
                        <span class="range-value" id="pulse-size-val"></span>
                    </div>
                </div>
                <div class="setting-item">
                    <label class="subtitle-card">Скорость</label>
                    <div class="range-with-val">
                        <input type="range" id="pulse-speed-input" data-setting="theme.widget_pulse_speed" min="0" max="5" step="0.1" class="range-input">
                        <span class="range-value" id="pulse-speed-val"></span>
                    </div>
                </div>
                <div class="setting-item">
                    <label class="subtitle-card">Частота</label>
                    <div class="range-with-val">
                        <input type="range" id="pulse-pause-input" data-setting="theme.widget_pulse_pause" min="0" max="10" step="0.1" class="range-input">
                        <span class="range-value" id="pulse-pause-val"></span>
                    </div>
                </div>
            </div>
            <div class="flex-between-compact">
                <h3 class="subtitle-card-bold-muted">Блик</h3>
                <label class="switch sm-switch">
                    <input type="checkbox" id="widget-glare-toggle" data-setting="theme.widget_glare_enabled">
                    <span class="slider round"></span>
                </label>
            </div>
            <div id="glare-settings-group" class="settings-form-mini">
                <div class="setting-item">
                    <label class="subtitle-card">Цвет</label>
                    <div class="color-input-group">
                        <div class="color-circle-wrapper">
                            <div class="color-circle-bg" id="glare-color-preview"></div>
                            <input type="color" id="glare-color-picker" class="hidden-picker">
                        </div>
                        <input type="text" id="glare-color-hex" spellcheck="false" class="color_hex hex-input-full" data-setting="theme.widget_glare_color" placeholder="Прозрачный">
                    </div>
                </div>
                <div class="setting-item">
                    <label class="subtitle-card">Прозрачность</label>
                    <div class="range-with-val">
                        <input type="range" id="widget-glare-opacity-input" data-setting="theme.widget_glare_opacity" min="0" max="100" class="range-input">
                        <span class="range-value" id="widget-glare-opacity-val"></span>
                    </div>
                </div>
                <div class="setting-item">
                    <label class="subtitle-card">Размер</label>
                    <div class="range-with-val">
                        <input type="range" id="widget-glare-size-input" data-setting="theme.widget_glare_size" min="10" max="100" step="1" class="range-input">
                        <span class="range-value" id="widget-glare-size-val"></span>
                    </div>
                </div>
                <div class="setting-item">
                    <label class="subtitle-card">Скорость</label>
                    <div class="range-with-val">
                        <input type="range" id="widget-glare-speed-input" data-setting="theme.widget_glare_speed" min="0" max="10" step="0.1" class="range-input">
                        <span class="range-value" id="widget-glare-speed-val"></span>
                    </div>
                </div>
                <div class="setting-item">
                    <label class="subtitle-card">Частота</label>
                    <div class="range-with-val">
                        <input type="range" id="widget-glare-pause-input" data-setting="theme.widget_glare_pause" min="0" max="10" step="0.1" class="range-input">
                        <span class="range-value" id="widget-glare-pause-val"></span>
                    </div>
                </div>
            </div>
            <div class="flex-between-compact">
                <h3 class="subtitle-card-bold-muted">Дыхание</h3>
                <label class="switch sm-switch">
                    <input type="checkbox" id="widget-breathing-toggle" data-setting="theme.widget_breathing_enabled">
                    <span class="slider round"></span>
                </label>
            </div>
            <div id="breathing-settings-group" class="settings-form-mini">
                <div class="setting-item">
                    <label class="subtitle-card">Размер</label>
                    <div class="range-with-val">
                        <input type="range" id="widget-breathing-scale-input" data-setting="theme.widget_breathing_scale" min="0" max="20" step="1" class="range-input">
                        <span class="range-value" id="widget-breathing-scale-val"></span>
                    </div>
                </div>
                <div class="setting-item">
                    <label class="subtitle-card">Скорость</label>
                    <div class="range-with-val">
                        <input type="range" id="widget-breathing-speed-input" data-setting="theme.widget_breathing_speed" min="0.1" max="5" step="0.1" class="range-input">
                        <span class="range-value" id="widget-breathing-speed-val"></span>
                    </div>
                </div>
                <div class="setting-item">
                    <label class="subtitle-card">Частота</label>
                    <div class="range-with-val">
                        <input type="range" id="widget-breathing-pause-input" data-setting="theme.widget_breathing_pause" min="0" max="10" step="0.1" class="range-input">
                        <span class="range-value" id="widget-breathing-pause-val"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
