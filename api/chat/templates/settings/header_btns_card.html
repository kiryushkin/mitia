<!-- КНОПКИ ШАПКИ -->
<div class="bento-card" id="card-header-btns-design">
    <div class="card-header-flex">
        <div class="card-title-group" onclick="window.toggleCardCollapse(this)">
            <div class="collapse-icon"></div>
            <h3 class="card-title">Кнопки шапки</h3>
        </div>
        <!-- Иконки -->
        <div class="card-actions-mini">
            <button class="icon-btn-sm" onclick="window.resetHeaderButtonsToDefault()" title="Восстановить дизайн">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>
            </button>
            <button class="icon-btn-sm" onclick="window.randomizeHeaderButtonsDesign()" title="Магический дизайн">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2 12L9.5 9.5L12 2Z"/></svg>
            </button>
        </div>
    </div>
    <!-- Параметры кнопок шапки -->
    <div class="settings-form">

            <h3 class="subtitle-card-bold white">Статус</h3>
        </div>
        <!-- Показать кнопку шапки закрыть окно -->
        <div class="setting-item-compact">
            <div class="flex-between">
                <label class="subtitle-card">Показать кнопку «Закрыть окно»</label>
                <label class="switch sm-switch">
                    <input type="checkbox" id="header-close-toggle" data-setting="theme.header_close_enabled">
                    <span class="slider round"></span>
                </label>
            </div>
        </div>
        <!-- Показать кнопку шапки изменить размер -->
        <div class="setting-item-compact">
            <div class="flex-between">
                <label class="subtitle-card">Показать кнопку «Изменить размер»</label>
                <label class="switch sm-switch">
                    <input type="checkbox" id="header-expand-toggle" data-setting="theme.header_expand_enabled">
                    <span class="slider round"></span>
                </label>
            </div>
        </div>
        <!-- ГЕОМЕТРИЯ КНОПОК ШАПКИ -->
        <div class="flex-between">
            <h3 class="subtitle-card-bold white">Геометрия</h3>
        </div>
        <!-- Расположение кнопок шапки -->
        <div class="setting-item">
            <label class="subtitle-card">Расположение</label>
            <div class="side-selector">
                <button class="side-btn" data-side-val="left" onclick="window.setHeaderSide('left')">Слева</button>
                <button class="side-btn" data-side-val="right" onclick="window.setHeaderSide('right')">Справа</button>
                <input type="hidden" id="header-side-input" data-setting="theme.header_icons_side">
            </div>
        </div>
        <!-- Тип кнопки шапки -->
        <div class="setting-item">
                <label class="subtitle-card">Тип</label>
                <div class="type-switcher" id="header-button-type-switcher">

                <button class="type-btn" data-btn-type="expand">Изменить размер</button>
            </div>
        </div>
        <!-- Размер кнопок шапки -->
        <div class="setting-item">
            <label class="subtitle-card">Размер</label>
            <div class="range-with-val">
                <input type="range" id="header-btn-size-input" data-setting="theme.header_btn_size" min="24" max="60" class="range-input">
                <span class="range-value" id="header-btn-size-val"></span>
            </div>
        </div>
        <!-- Скругление кнопок шапки -->

            <label class="subtitle-card">Скругление</label>

                <span class="range-value" id="header-btn-radius-val"></span>
            </div>
        </div>
        
            <!-- ИКОНКА КНОПКИ ШАПКИ -->
