<div class="bento-card" id="card-inline-buttons-design">
    <div class="card-header-flex">
        <div class="card-title-group">
            <h3 class="card-title">Интерактив</h3>
        </div>
        <div class="card-actions-mini">
            <button class="menu-dots-btn" onclick="window.resetButtonsToDefault()" title="Восстановить дизайн">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>
            </button>
            <button class="menu-dots-btn" onclick="window.randomizeButtonsDesign()" title="Магический дизайн">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2 12L9.5 9.5L12 2Z"/></svg>
            </button>
            <button class="icon-btn-sm inline-buttons-collapse-btn" onclick="window.toggleCardCollapse(this)" title="Свернуть/развернуть карточку" aria-label="Свернуть/развернуть карточку">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
            </button>
        </div>
    </div>
    <p class="card-description">Кнопки внутри переписки</p>
    <div id="inline-buttons-settings-group" class="settings-form">
        <div class="flex-between">
            <h3 class="subtitle-card-bold white">Статус</h3>
        </div>

                <label class="subtitle-card">Предпросмотр</label>
                <label class="switch sm-switch">
                    <input type="checkbox" id="show-test-buttons-toggle" data-setting="theme.inline_btn_preview_enabled">
                    <span class="slider round"></span>
                </label>
            </div>
        </div>
        <div class="setting-item-compact">
            <div class="flex-between">
                <label class="subtitle-card">Отображение на сайте</label>
                <label class="switch sm-switch">
                    <input type="checkbox" id="inline-buttons-enabled-toggle" data-setting="theme.inline_buttons_enabled">
                    <span class="slider round"></span>
                </label>
            </div>
        </div>
        <div class="flex-between">
            <h3 class="subtitle-card-bold white">Геометрия</h3>
        </div>
        <div class="setting-item">
            <label class="subtitle-card">Высота</label>
            <div class="range-with-val">
                <input type="range" id="inline-btn-height-input" spellcheck="false" class="range-input" min="20" max="60">
                <span class="range-value" id="inline-btn-height-val"></span>
            </div>
        </div>
        <div class="setting-item">
            <label class="subtitle-card">Ширина</label>

        </div>
        <div class="setting-item">
            <label class="subtitle-card">Скругление</label>
            <div class="range-with-val">
                <input type="range" id="inline-btn-radius-input" spellcheck="false" class="range-input" min="0" max="30">
                <span class="range-value" id="inline-btn-radius-val"></span>

        </div>
        <div class="flex-between">
            <h3 class="subtitle-card-bold white">Кнопки</h3>
        </div>

            <label class="subtitle-card">Тип</label>

            </div>
        </div>

        </div>

                <div class="custom-select" id="inline-btn-font-family-custom-select">

                    </div>
                    <input type="text" id="inline-btn-text-hex" spellcheck="false" class="color_hex hex-input-full" placeholder="Прозрачный">

            <div class="setting-item">
