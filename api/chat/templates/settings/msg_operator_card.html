<div class="bento-card" id="card-msg-operator-design">
    <div class="card-header-flex">
        <div class="card-title-group">
            <h3 class="card-title">Оператор</h3>
        </div>
        <div class="card-actions-mini">
            <button class="menu-dots-btn" onclick="window.resetMsgOperatorToDefault()" title="Восстановить дизайн">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>
            </button>
            <button class="menu-dots-btn" onclick="window.randomizeMessagesDesign('operator')" title="Магический дизайн">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2 12L9.5 9.5L12 2Z"/></svg>
            </button>
            <button class="icon-btn-sm msg-operator-collapse-btn" onclick="window.toggleCardCollapse(this)" title="Свернуть/развернуть карточку" aria-label="Свернуть/развернуть карточку">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
            </button>
        </div>
    </div>
    <p class="card-description">Сообщения и аватар оператора</p>
    <div class="settings-form">
        <div class="flex-between">
            <h3 class="subtitle-card-bold white">Статус</h3>
        </div>
        <div class="setting-item-compact">
            <div class="flex-between">
                <label class="subtitle-card">Предпросмотр</label>
                <label class="switch sm-switch">
                    <input type="checkbox" id="msg-operator-preview-enabled-toggle" data-setting="theme.msg_operator_preview_enabled">
                    <span class="slider round"></span>
                </label>
            </div>
        </div>
        <div class="flex-between">
            <h3 class="subtitle-card-bold white">Изображение</h3>
            <label class="switch sm-switch">
                <input type="checkbox" id="msg-operator-avatar-enabled-toggle" data-setting="theme.msg_operator_avatar_enabled">
                <span class="slider round"></span>
            </label>
        </div>
        <div id="msg-operator-avatar-group" class="settings-form-mini">
            <div class="setting-item">
                <label class="subtitle-card">Загрузить изображение</label>
                <div class="color-input-group">
                    <div id="msg-operator-avatar-preview" class="img-upload-preview" onclick="document.getElementById('msg-operator-avatar-upload').click()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="placeholder-icon"><circle cx="12" cy="12" r="1"></circle><circle cx="19" cy="12" r="1"></circle><circle cx="5" cy="12" r="1"></circle></svg>
                        <button id="msg-operator-avatar-remove-btn" class="avatar-remove-btn" style="display: none;" onclick="event.stopPropagation(); window.removeAvatar('operator')">
                            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                                <line x1="18" y1="6" x2="6" y2="18"></line>
                                <line x1="6" y1="6" x2="18" y2="18"></line>
                            </svg>
                        </button>
                    </div>
                    <div class="upload-info">
                        <span class="upload-hint">JPG, PNG, SVG, GIF, WEBP. Макс. вес: 500 KB</span>
                    </div>
                    <input type="file" id="msg-operator-avatar-upload" hidden accept=".jpg,.jpeg,.png,.svg,.gif,.webp">
                </div>
            </div>
            <div class="setting-item">
                <label class="subtitle-card">Прозрачность</label>
                <div class="range-with-val">
                    <input type="range" id="msg-operator-avatar-opacity-input" data-setting="theme.msg_operator_avatar_opacity" min="0" max="100" class="range-input">
                    <span class="range-value" id="msg-operator-avatar-opacity-val"></span>
                </div>
            </div>
            <div class="setting-item">
                <label class="subtitle-card">Скругление</label>
                <div class="range-with-val">
                    <input type="range" id="msg-operator-avatar-radius-input" data-setting="theme.msg_operator_avatar_radius" min="0" max="50" class="range-input">
                    <span class="range-value" id="msg-operator-avatar-radius-val"></span>
                </div>
            </div>
        </div>
        <div class="flex-between">
            <h3 class="subtitle-card-bold white">Текст</h3>
        </div>
        <div class="settings-form-mini">
            <div class="setting-item">
                <label class="subtitle-card">Шрифт</label>
                <div class="custom-select" id="msg-operator-font-family-select-container">
                    <div class="select-trigger">
                        <span id="msg-operator-current-font-name">Geist</span>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"></polyline></svg>
                    </div>
                    <div class="select-options">
                    </div>
                </div>
                <input type="hidden" id="msg-operator-font-family-select" data-setting="theme.msg_operator_font_family">
            </div>
            <div class="setting-item">
                <label class="subtitle-card">Цвет</label>
                <div class="color-input-group">
                    <div class="color-circle-wrapper">
                        <div class="color-circle-bg" id="msg-operator-text-preview"></div>
                        <input type="color" id="msg-operator-text-picker" class="hidden-picker">
                    </div>
                    <input type="text" id="msg-operator-text-hex" class="color_hex hex-input-full" data-setting="theme.msg_operator_text_color" placeholder="Прозрачный">
                </div>
            </div>
            <div class="setting-item">
                <label class="subtitle-card">Прозрачность</label>
                <div class="range-with-val">
                    <input type="range" id="msg-operator-text-opacity-input" data-setting="theme.msg_operator_text_opacity" min="0" max="100" class="range-input">
                    <span class="range-value" id="msg-operator-text-opacity-val"></span>
                </div>
            </div>
            <div class="setting-item">
                <label class="subtitle-card">Размер</label>
                <div class="range-with-val">
                    <input type="range" id="msg-operator-font-size-input" data-setting="theme.msg_operator_font_size" min="10" max="40" class="range-input">
                    <span class="range-value" id="msg-operator-font-size-val"></span>
                </div>
            </div>
            <div class="setting-item">
                <label class="subtitle-card">Толщина</label>
                <div class="range-with-val">
                    <input type="range" id="msg-operator-font-weight-input" data-setting="theme.msg_operator_font_weight" min="100" max="900" step="100" class="range-input">
                    <span class="range-value" id="msg-operator-font-weight-val"></span>
                </div>
            </div>
        </div>
        <div class="flex-between">
            <h3 class="subtitle-card-bold white">Ссылки</h3>
        </div>
        <div class="settings-form-mini">
            <div class="setting-item">
                <label class="subtitle-card">Цвет</label>
                <div class="color-input-group">
                    <div class="color-circle-wrapper">
                        <div class="color-circle-bg" id="msg-operator-link-color-preview"></div>
                        <input type="color" id="msg-operator-link-color-picker" class="hidden-picker">
                    </div>
                    <input type="text" id="msg-operator-link-color-hex" class="color_hex hex-input-full" data-setting="theme.msg_operator_link_color" placeholder="Прозрачный">
                </div>
            </div>
            <div class="setting-item">
                <label class="subtitle-card">Прозрачность</label>
                <div class="range-with-val">
                    <input type="range" id="msg-operator-link-opacity-input" data-setting="theme.msg_operator_link_opacity" min="0" max="100" class="range-input">
                    <span class="range-value" id="msg-operator-link-opacity-val"></span>
                </div>
            </div>
        </div>
        <div class="flex-between">
            <h3 class="subtitle-card-bold white">Ссылки при наведении</h3>
            <label class="switch sm-switch">
                <input type="checkbox" id="msg-operator-link-h-enabled-toggle" data-setting="theme.msg_operator_link_h_enabled">
                <span class="slider round"></span>
            </label>
        </div>
        <div id="msg-operator-link-h-group" class="settings-form-mini">
            <div class="setting-item">
                <label class="subtitle-card">Цвет</label>
                <div class="color-input-group">
                    <div class="color-circle-wrapper">
                        <div class="color-circle-bg" id="msg-operator-link-h-color-preview"></div>
                        <input type="color" id="msg-operator-link-h-color-picker" class="hidden-picker">
                    </div>
                    <input type="text" id="msg-operator-link-h-color-hex" class="color_hex hex-input-full" data-setting="theme.msg_operator_link_color_h" placeholder="Прозрачный">
                </div>
            </div>
            <div class="setting-item">
                <label class="subtitle-card">Прозрачность</label>
                <div class="range-with-val">
                    <input type="range" id="msg-operator-link-h-opacity-input" data-setting="theme.msg_operator_link_opacity_h" min="0" max="100" class="range-input">
                    <span class="range-value" id="msg-operator-link-h-opacity-val"></span>
                </div>
            </div>
        </div>
        <div class="flex-between">
            <h3 class="subtitle-card-bold white">Фон</h3>
            <label class="switch sm-switch">
                <input type="checkbox" id="msg-operator-bg-enabled-toggle" data-setting="theme.msg_operator_bg_enabled">
                <span class="slider round"></span>
            </label>
        </div>
        <div id="msg-operator-bg-group" class="settings-form-mini">
            <div class="setting-item">
                <label class="subtitle-card">Цвет</label>
                <div class="color-input-group">
                    <div class="color-circle-wrapper">
                        <div class="color-circle-bg" id="msg-operator-bg-preview"></div>
                        <input type="color" id="msg-operator-bg-picker" class="hidden-picker">
                    </div>
                    <input type="text" id="msg-operator-bg-hex" class="color_hex hex-input-full" data-setting="theme.msg_operator_bg_color" placeholder="Прозрачный">
                </div>
            </div>
            <div class="setting-item">
                <label class="subtitle-card">Прозрачность</label>
                <div class="range-with-val">
                    <input type="range" id="msg-operator-bg-opacity-input" data-setting="theme.msg_operator_bg_opacity" min="0" max="100" class="range-input">
                    <span class="range-value" id="msg-operator-bg-opacity-val"></span>
                </div>
            </div>
        </div>
        <div class="flex-between">
            <h3 class="subtitle-card-bold white">Обводка</h3>
            <label class="switch sm-switch">
                <input type="checkbox" id="msg-operator-border-enabled-toggle" data-setting="theme.msg_operator_border_enabled">
                <span class="slider round"></span>
            </label>
        </div>
        <div id="msg-operator-border-group" class="settings-form-mini">
            <div class="setting-item">
                <label class="subtitle-card">Цвет</label>
                <div class="color-input-group">
                    <div class="color-circle-wrapper">
                        <div class="color-circle-bg" id="msg-operator-border-preview"></div>
                        <input type="color" id="msg-operator-border-picker" class="hidden-picker">
                    </div>
                    <input type="text" id="msg-operator-border-hex" class="color_hex hex-input-full" data-setting="theme.msg_operator_border_color" placeholder="Прозрачный">
                </div>
            </div>
            <div class="setting-item">
                <label class="subtitle-card">Прозрачность</label>
                <div class="range-with-val">
                    <input type="range" id="msg-operator-border-opacity-input" data-setting="theme.msg_operator_border_opacity" min="0" max="100" class="range-input">
                    <span class="range-value" id="msg-operator-border-opacity-val"></span>
                </div>
            </div>
            <div class="setting-item">
                <label class="subtitle-card">Толщина</label>
                <div class="range-with-val">
                    <input type="range" id="msg-operator-border-width-input" data-setting="theme.msg_operator_border_width" min="0" max="10" class="range-input">
                    <span class="range-value" id="msg-operator-border-width-val"></span>
                </div>
            </div>
        </div>
    </div>
</div>
