<!-- ПОЛЬЗОВАТЕЛЬ -->
<div class="bento-card" id="card-msg-user-design">
    <div class="card-header-flex">
        <div class="card-title-group" onclick="window.toggleCardCollapse(this)">
            <div class="collapse-icon"></div>
            <h3 class="card-title">Пользователь</h3>
        </div>
        <!-- Иконки -->
        <div class="card-actions-mini">
            <button class="icon-btn-sm" onclick="window.resetMsgUserToDefault()" title="Восстановить дизайн">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>
            </button>
            <button class="icon-btn-sm" onclick="window.randomizeMessagesDesign('user')" title="Магический дизайн">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2 12L9.5 9.5L12 2Z"/></svg>
            </button>
        </div>
    </div>
    <!-- Параметры сообщения пользователя -->
    <div class="settings-form">
        <!-- СТАТУС ПРЕДПРОСМОТРА СООБЩЕНИЯ ПОЛЬЗОВАТЕЛЯ -->
        <div class="flex-between">
            <h3 class="subtitle-card-bold white">Статус</h3>
        </div>
        <div class="setting-item-compact">
            <div class="flex-between">
                <label class="subtitle-card">Предпросмотр</label>
                <label class="switch sm-switch">
                    <input type="checkbox" id="msg-user-preview-enabled-toggle" data-setting="theme.msg_user_preview_enabled">
                    <span class="slider round"></span>
                </label>
            </div>
        </div>
        <!-- ИЗОБРАЖЕНИЕ ПОЛЬЗОВАТЕЛЯ -->
        <div class="flex-between">
            <h3 class="subtitle-card-bold white">Изображение</h3>
            <label class="switch sm-switch">
                <input type="checkbox" id="msg-user-avatar-enabled-toggle" data-setting="theme.msg_user_avatar_enabled">
                <span class="slider round"></span>
            </label>
        </div>
        <!-- Параметры изображения пользователя -->
        <div id="msg-user-avatar-group" class="settings-form-mini">
            <!-- Загрузить изображение пользователя -->
            <div class="setting-item">
                <label class="subtitle-card">Загрузить изображение</label>
                <div class="color-input-group">
                    <div id="msg-user-avatar-preview" class="img-upload-preview" onclick="document.getElementById('msg-user-avatar-upload').click()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="placeholder-icon"><circle cx="12" cy="12" r="1"></circle><circle cx="19" cy="12" r="1"></circle><circle cx="5" cy="12" r="1"></circle></svg>
                        <button id="msg-user-avatar-remove-btn" class="avatar-remove-btn" style="display: none;" onclick="event.stopPropagation(); window.removeAvatar('user')">
                            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                                <line x1="18" y1="6" x2="6" y2="18"></line>
                                <line x1="6" y1="6" x2="18" y2="18"></line>
                            </svg>
                        </button>
                    </div>
                    <input type="file" id="msg-user-avatar-upload" hidden accept=".jpg,.jpeg,.png,.svg,.gif,.webp">
                </div>
            </div>
            <!-- Прозрачность изображения пользователя -->
            <div class="setting-item">
                <label class="subtitle-card">Прозрачность</label>
                <div class="range-with-val">
                    <input type="range" id="msg-user-avatar-opacity-input" data-setting="theme.msg_user_avatar_opacity" min="0" max="100" class="range-input">
                    <span class="range-value" id="msg-user-avatar-opacity-val"></span>
                </div>
            </div>
            <!-- Скругление изображения пользователя -->
            <div class="setting-item">
                <label class="subtitle-card">Скругление</label>
                <div class="range-with-val">
                    <input type="range" id="msg-user-avatar-radius-input" data-setting="theme.msg_user_avatar_radius" min="0" max="50" class="range-input">
                    <span class="range-value" id="msg-user-avatar-radius-val"></span>
                </div>
            </div>
        </div>
        <!-- ТЕКСТ СООБЩЕНИЯ ПОЛЬЗОВАТЕЛЯ-->
        <div class="flex-between">
            <h3 class="subtitle-card-bold white">Текст</h3>
        </div>
        <!-- Параметры текста сообщения пользователя -->
        <div class="settings-form-mini">
            <!-- Шрифт текста сообщения пользователя -->
            <div class="setting-item">
                <label class="subtitle-card">Шрифт</label>
                <div class="custom-select" id="msg-user-font-family-select-container">
                    <div class="select-trigger">
                        <span id="msg-user-current-font-name">Geist</span>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"></polyline></svg>
                    </div>
                    <div class="select-options">
                        <!-- Заполняется динамически через FontManager -->
                    </div>
                </div>
                <input type="hidden" id="msg-user-font-family-select" data-setting="theme.msg_user_font_family">
            </div>
            <!-- Цвет текста сообщения пользователя -->
            <div class="setting-item">
                <label class="subtitle-card">Цвет</label>
                <div class="color-input-group">
                    <div class="color-circle-wrapper">
                        <div class="color-circle-bg" id="msg-user-text-preview"></div>
                        <input type="color" id="msg-user-text-picker" class="hidden-picker">
                    </div>
                    <input type="text" id="msg-user-text-hex" class="color_hex hex-input-full" data-setting="theme.msg_user_text_color" placeholder="Прозрачный">
                </div>
            </div>
            <!-- Прозрачность текста сообщения пользователя -->
            <div class="setting-item">
                <label class="subtitle-card">Прозрачность</label>
                <div class="range-with-val">
                    <input type="range" id="msg-user-text-opacity-input" data-setting="theme.msg_user_text_opacity" min="0" max="100" class="range-input">
                    <span class="range-value" id="msg-user-text-opacity-val"></span>
                </div>
            </div>
            <!-- Размер текста сообщения пользователя -->
            <div class="setting-item">
                <label class="subtitle-card">Размер</label>
                <div class="range-with-val">
                    <input type="range" id="msg-user-font-size-input" data-setting="theme.msg_user_font_size" min="10" max="40" class="range-input">
                    <span class="range-value" id="msg-user-font-size-val"></span>
                </div>
            </div>
            <!-- Толщина текста сообщения пользователя -->
            <div class="setting-item">
                <label class="subtitle-card">Толщина</label>
                <div class="range-with-val">
                    <input type="range" id="msg-user-font-weight-input" data-setting="theme.msg_user_font_weight" min="100" max="900" step="100" class="range-input">
                    <span class="range-value" id="msg-user-font-weight-val"></span>
                </div>
            </div>
        </div>

        <!-- ССЫЛКИ В СООБЩЕНИИ ПОЛЬЗОВАТЕЛЯ -->
        <div class="flex-between">
            <h3 class="subtitle-card-bold white">Ссылки</h3>
        </div>
        <!-- Параметры ссылок пользователя -->
        <div class="settings-form-mini">
            <!-- Цвет ссылки пользователя -->
            <div class="setting-item">
                <label class="subtitle-card">Цвет</label>
                <div class="color-input-group">
                    <div class="color-circle-wrapper">
                        <div class="color-circle-bg" id="msg-user-link-color-preview"></div>
                        <input type="color" id="msg-user-link-color-picker" class="hidden-picker">
                    </div>
                    <input type="text" id="msg-user-link-color-hex" class="color_hex hex-input-full" data-setting="theme.msg_user_link_color" placeholder="Прозрачный">
                </div>
            </div>
            <!-- Прозрачность ссылки пользователя -->
            <div class="setting-item">
                <label class="subtitle-card">Прозрачность</label>
                <div class="range-with-val">
                    <input type="range" id="msg-user-link-opacity-input" data-setting="theme.msg_user_link_opacity" min="0" max="100" class="range-input">
                    <span class="range-value" id="msg-user-link-opacity-val"></span>
                </div>
            </div>
        </div>

        <!-- ССЫЛКИ ПРИ НАВЕДЕНИИ -->
        <div class="flex-between">
            <h3 class="subtitle-card-bold white">Ссылки при наведении</h3>
            <label class="switch sm-switch">
                <input type="checkbox" id="msg-user-link-h-enabled-toggle" data-setting="theme.msg_user_link_h_enabled">
                <span class="slider round"></span>
            </label>
        </div>
        <!-- Параметры ссылок пользователя при наведении -->
        <div id="msg-user-link-h-group" class="settings-form-mini">
            <!-- Цвет ссылки пользователя при наведении -->
            <div class="setting-item">
                <label class="subtitle-card">Цвет</label>
                <div class="color-input-group">
                    <div class="color-circle-wrapper">
                        <div class="color-circle-bg" id="msg-user-link-h-color-preview"></div>
                        <input type="color" id="msg-user-link-h-color-picker" class="hidden-picker">
                    </div>
                    <input type="text" id="msg-user-link-h-color-hex" class="color_hex hex-input-full" data-setting="theme.msg_user_link_color_h" placeholder="Прозрачный">
                </div>
            </div>
            <!-- Прозрачность ссылки пользователя при наведении -->
            <div class="setting-item">
                <label class="subtitle-card">Прозрачность</label>
                <div class="range-with-val">
                    <input type="range" id="msg-user-link-h-opacity-input" data-setting="theme.msg_user_link_opacity_h" min="0" max="100" class="range-input">
                    <span class="range-value" id="msg-user-link-h-opacity-val"></span>
                </div>
            </div>
        </div>

        <!-- ФОН СООБЩЕНИЯ ПОЛЬЗОВАТЕЛЯ -->
        <div class="flex-between">
            <h3 class="subtitle-card-bold white">Фон</h3>
            <label class="switch sm-switch">
                <input type="checkbox" id="msg-user-bg-enabled-toggle" data-setting="theme.msg_user_bg_enabled">
                <span class="slider round"></span>
            </label>
        </div>
        <!-- Параметры фона сообщения пользователя -->
        <div id="msg-user-bg-group" class="settings-form-mini">
            <!-- Цвет фона сообщения пользователя -->
            <div class="setting-item">
                <label class="subtitle-card">Цвет</label>
                <div class="color-input-group">
                    <div class="color-circle-wrapper">
                        <div class="color-circle-bg" id="msg-user-bg-preview"></div>
                        <input type="color" id="msg-user-bg-picker" class="hidden-picker">
                    </div>
                    <input type="text" id="msg-user-bg-hex" class="color_hex hex-input-full" data-setting="theme.msg_user_bg_color" placeholder="Прозрачный">
                </div>
            </div>
            <!-- Прозрачность фона сообщения пользователя -->
            <div class="setting-item">
                <label class="subtitle-card">Прозрачность</label>
                <div class="range-with-val">
                    <input type="range" id="msg-user-bg-opacity-input" data-setting="theme.msg_user_bg_opacity" min="0" max="100" class="range-input">
                    <span class="range-value" id="msg-user-bg-opacity-val"></span>
                </div>
            </div>
        </div>
        <!-- ОБВОДКА СООБЩЕНИЯ ПОЛЬЗОВАТЕЛЯ -->
        <div class="flex-between">
            <h3 class="subtitle-card-bold white">Обводка</h3>
            <label class="switch sm-switch">
                <input type="checkbox" id="msg-user-border-enabled-toggle" data-setting="theme.msg_user_border_enabled">
                <span class="slider round"></span>
            </label>
        </div>
        <!-- Параметры обводки сообщения пользователя -->
        <div id="msg-user-border-group" class="settings-form-mini">
            <!-- Цвет обводки сообщения пользователя -->
            <div class="setting-item">
                <label class="subtitle-card">Цвет</label>
                <div class="color-input-group">
                    <div class="color-circle-wrapper">
                        <div class="color-circle-bg" id="msg-user-border-preview"></div>
                        <input type="color" id="msg-user-border-picker" class="hidden-picker">
                    </div>
                    <input type="text" id="msg-user-border-hex" class="color_hex hex-input-full" data-setting="theme.msg_user_border_color" placeholder="Прозрачный">
                </div>
            </div>
            <!-- Прозрачность обводки сообщения пользователя -->
            <div class="setting-item">
                <label class="subtitle-card">Прозрачность</label>
                <div class="range-with-val">
                    <input type="range" id="msg-user-border-opacity-input" data-setting="theme.msg_user_border_opacity" min="0" max="100" class="range-input">
                    <span class="range-value" id="msg-user-border-opacity-val"></span>
                </div>
            </div>
            <!-- Толщина обводки сообщения пользователя -->
            <div class="setting-item">
                <label class="subtitle-card">Толщина</label>
                <div class="range-with-val">
                    <input type="range" id="msg-user-border-width-input" data-setting="theme.msg_user_border_width" min="0" max="10" class="range-input">
                    <span class="range-value" id="msg-user-border-width-val"></span>
                </div>
            </div>
        </div>
    </div>
</div>
