<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Control</title>
    <meta name="robots" content="noindex, nofollow, noarchive">
    <meta name="googlebot" content="noindex, nofollow">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔒</text></svg>">
    <script src="http://127.0.0.1:5007/api/chat/chat-widget.js?client_id=mitia_assistant" defer></script>
    <style>
        :root { --primary: #ff3300; --bg: #ffffff; --text: #1a1a1a; --gray: #f4f4f4; --border: #e0e0e0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; line-height: 1.5; }
        .container { width: 100%; max-width: 100%; margin: 0; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        h1 { margin: 0; font-size: 24px; font-weight: 800; color: var(--primary); }
        
        .search-box { margin-bottom: 20px; display: flex; gap: 10px; }
        input[type="text"] { flex: 1; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 16px; }
        
        /* Desktop Table */
        .desktop-table { width: 100%; border-collapse: collapse; display: none; }
        .desktop-table th { text-align: left; padding: 12px; border-bottom: 2px solid var(--border); color: #666; font-size: 13px; text-transform: uppercase; }
        .desktop-table td { padding: 15px 12px; border-bottom: 1px solid var(--border); }
        
        /* Mobile List */
        .mobile-list { display: block; }
        .user-card { background: var(--gray); margin-bottom: 10px; border-radius: 10px; padding: 15px; cursor: pointer; transition: transform 0.1s; position: relative; }
        .user-card:active { transform: scale(0.98); }
        .user-card .email { font-weight: 600; font-size: 16px; padding-right: 20px; }
        .user-card .mobile-status { position: absolute; top: 15px; right: 15px; width: 12px; height: 12px; border-radius: 50%; }
        .user-card .details { display: block; margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--border); }
        .user-card:not(.active) .details { display: none; }
        
        .mobile-actions { display: flex; flex-direction: column; gap: 10px; width: 100%; }
        .mobile-actions .btn { width: 100%; }
        .mobile-balance-row { display: flex; gap: 10px; margin-bottom: 15px; width: 100%; }
        .mobile-balance-row .balance-input { flex: 1; height: 40px; }
        
        .btn { padding: 10px 15px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; font-size: 14px; transition: opacity 0.2s; height: 40px; box-sizing: border-box; vertical-align: middle; -webkit-appearance: none; -moz-appearance: none; appearance: none; }
        .btn:hover { opacity: 0.8; }
        .btn-del { background: #ff4d4d; color: white; }
        .btn-toggle { background: #eee; color: #333; }
        .btn-toggle.active { background: #28a745; color: white; }
        
        .balance-input { 
            height: 40px; 
            padding: 0 10px; 
            border: 1px solid var(--border); 
            border-radius: 6px; 
            box-sizing: border-box; 
            vertical-align: middle;
            -webkit-appearance: none;
            -moz-appearance: textfield;
            appearance: none;
        }
        .balance-input::-webkit-outer-spin-button,
        .balance-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .status-badge { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 5px; }
        .status-on { background: #28a745; }
        .status-off { background: #ff4d4d; }

        @media (min-width: 768px) {
            .desktop-table { display: table; }
            .mobile-list { display: none; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Mitia.Admin</h1>
            <div style="display: flex; align-items: center; gap: 15px;">
                <div id="stats" style="font-size: 14px; color: #666;"></div>
                <button id="reauthBtn" class="btn btn-toggle" onclick="reAuth()" style="display: none; font-size: 12px; height: 32px;">Сменить токен</button>
            </div>
        </header>

        <div id="errorBox" style="display: none; background: #fff3cd; border: 1px solid #ffc107; padding: 15px; border-radius: 8px; margin-bottom: 20px; color: #856404;"></div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Поиск по email..." oninput="loadUsers()">
        </div>

        <div id="mobileList" class="mobile-list"></div>
        
        <table id="desktopTable" class="desktop-table">
            <thead>
                <tr>
                    <th>Email / сайт</th>
                    <th>Баланс</th>
                    <th>Тариф</th>
                    <th>Активность</th>
                    <th>Пополнение</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody id="desktopBody"></tbody>
        </table>
    </div>

    <script>
        const STORAGE_KEY = 'superadmin_auth_token';
        let TOKEN = localStorage.getItem(STORAGE_KEY);

        function getToken() {
            if (!TOKEN) {
                TOKEN = prompt('Введите SUPERADMIN_MASTER_TOKEN:');
                if (TOKEN) localStorage.setItem(STORAGE_KEY, TOKEN);
            }
            return TOKEN;
        }

        // Показываем кнопку перевхода, если токен уже есть
        if (TOKEN) {
            document.getElementById('reauthBtn').style.display = 'inline-block';
        }

        function reAuth() {
            TOKEN = null;
            localStorage.removeItem(STORAGE_KEY);
            document.getElementById('reauthBtn').style.display = 'none';
            document.getElementById('errorBox').style.display = 'none';
            if (!getToken()) return;
            document.getElementById('reauthBtn').style.display = 'inline-block';
            loadUsers();
        }

        function showError(message) {
            const box = document.getElementById('errorBox');
            box.innerText = message;
            box.style.display = 'block';
            document.getElementById('reauthBtn').style.display = 'inline-block';
        }

        async function loadUsers() {
            const token = getToken();
            if (!token) return showError('Токен не указан');

            const q = document.getElementById('searchInput').value;
            let res;
            try {
                res = await fetch(`/api/chat/superadmin/users?q=${q}`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
            } catch (e) {
                return showError('Ошибка сети: ' + e.message);
            }

            if (res.status === 403 || res.status === 401) {
                TOKEN = null;
                localStorage.removeItem(STORAGE_KEY);
                document.getElementById('reauthBtn').style.display = 'none';
                return showError('Неверный токен. Нажмите «Сменить токен» или обновите страницу.');
            }

            const data = await res.json();
            if (data.status === 'success') {
                document.getElementById('errorBox').style.display = 'none';
                document.getElementById('reauthBtn').style.display = 'inline-block';
                renderDesktop(data.users);
                renderMobile(data.users);
                document.getElementById('stats').innerText = `Всего: ${data.users.length}`;
            } else {
                showError('Ошибка API: ' + (data.message || data.detail || JSON.stringify(data)));
            }
        }

        function renderDesktop(users) {
            const body = document.getElementById('desktopBody');
            body.innerHTML = users.map(u => `
                <tr>
                    <td>
                        <strong>${u.email}</strong><br>
                        <span style="font-size: 11px; color: ${u.is_verified ? '#28a745' : '#ff4d4d'}">
                            ${u.is_verified ? '● Почта подтверждена' : '○ Почта не подтверждена'}
                        </span><br>
                        <span style="font-size: 11px; color: ${u.notifications?.platform_news ? '#28a745' : '#888'}">
                            ${u.notifications?.platform_news ? '🔔 Подписан на новости' : '🔕 Нет подписки на новости'}
                        </span><br>
                        <span style="font-size: 11px; color: ${u.auto_renew ? '#28a745' : '#888'}">
                            ${u.auto_renew ? '🔄 Автопродление: ВКЛ' : '⏹ Автопродление: ВЫКЛ'}
                        </span><br>
                        <a href="${u.site_url}" target="_blank" style="font-size: 12px; color: var(--primary); text-decoration: none;">${u.site_url || 'Домен не указан'}</a>
                    </td>
                    <td>
                        <div style="font-weight: bold">${u.balance} ₽</div>
                        <small style="color: #28a745">Внес: ${u.total_paid} ₽</small><br>
                        <small style="color: #ff3300">Траты: ${u.total_spent} сообщ.</small>
                    </td>
                    <td>
                        <select class="balance-input" onchange="setTariff('${u.client_id}', this.value)" style="width: 100px; font-size: 12px;">
                            <option value="start" ${u.tariff === 'start' ? 'selected' : ''}>Старт</option>
                            <option value="business" ${u.tariff === 'business' ? 'selected' : ''}>Бизнес</option>
                            <option value="neuro" ${u.tariff === 'neuro' ? 'selected' : ''}>Нейро</option>
                        </select><br>
                        <small style="color: #666">Лимит: ${u.messages_consumed}</small><br>
                        <small style="color: #28a745">Оплачено до: ${u.tariff_expires_at ? new Date(u.tariff_expires_at).toLocaleDateString() : 'Не задано'}</small><br>
                        <div style="display: flex; gap: 5px; margin-top: 5px;">
                            <button class="btn btn-toggle" onclick="extendTariff('${u.client_id}')" style="height: 20px; font-size: 10px; padding: 0 5px; flex: 1;">+30 дней</button>
                            <button class="btn btn-del" onclick="resetTariff('${u.client_id}')" style="height: 20px; font-size: 10px; padding: 0 5px; flex: 1;">Сброс</button>
                        </div>
                    </td>
                    <td>
                        <div style="font-size: 13px;">Страниц: <strong>${u.indexed_pages}</strong></div>
                        <div style="font-size: 11px; color: #888; margin-top: 5px;">
                            Активность:<br>${u.last_activity ? new Date(u.last_activity).toLocaleString() : 'Нет данных'}
                        </div>
                    </td>
                    <td>
                        <div style="display: flex; align-items: center; gap: 5px;">
                            <button class="btn btn-del" onclick="addBalance('${u.client_id}', false, -1)" style="width: 30px; padding: 0;">-</button>
                            <input type="number" class="balance-input" placeholder="₽" id="add-${u.client_id}" style="width: 50px">
                            <button class="btn btn-toggle active" onclick="addBalance('${u.client_id}', false, 1)" style="width: 30px; padding: 0;">+</button>
                        </div>
                    </td>
                    <td>
                        <div style="display: flex; flex-direction: column; gap: 5px;">
                            <button class="btn btn-toggle" onclick="window.open('/admin-v2?client_id=${u.client_id}&su_token=' + encodeURIComponent(getToken()))">Админка</button>
                            <button class="btn ${u.is_active ? 'btn-toggle active' : 'btn-del'}" onclick="toggleStatus('${u.client_id}', ${u.is_active})">
                                ${u.is_active ? 'Вкл' : 'Выкл'}
                            </button>
                            <button class="btn btn-toggle" onclick="securityReset('${u.client_id}')">Экстренный сброс</button>
                            <button class="btn btn-del" onclick="deleteUser('${u.client_id}')">Удалить</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function renderMobile(users) {
            const list = document.getElementById('mobileList');
            list.innerHTML = users.map(u => `
                <div class="user-card" onclick="this.classList.toggle('active')">
                    <div class="mobile-status ${u.is_active ? 'status-on' : 'status-off'}"></div>
                    <div class="email">${u.email}</div>
                    <div style="font-size: 11px; color: ${u.is_verified ? '#28a745' : '#ff4d4d'}; margin-bottom: 5px;">
                        ${u.is_verified ? 'Почта подтверждена' : 'Почта не подтверждена'}
                    </div>
                    <div style="font-size: 13px; color: #666;">Баланс: ${u.balance} ₽ | Страниц: ${u.indexed_pages}</div>
                    <div style="font-size: 12px; color: var(--primary); margin-top: 5px;">${u.site_url || 'Домен не указан'}</div>
                    <div class="details">
                        <p><strong>Последняя активность:</strong><br>${u.last_activity ? new Date(u.last_activity).toLocaleString() : 'Нет данных'}</p>
                        <p><strong>Траты:</strong> ${u.total_spent} токенов | <strong>Оплачено:</strong> ${u.total_paid} ₽</p>
                        <div class="mobile-balance-row">
                            <button class="btn btn-del" onclick="event.stopPropagation(); addBalance('${u.client_id}', true, -1)" style="width: 40px; padding: 0;">-</button>
                            <input type="number" class="balance-input" placeholder="₽" id="add-m-${u.client_id}" onclick="event.stopPropagation()">
                            <button class="btn btn-toggle active" onclick="event.stopPropagation(); addBalance('${u.client_id}', true, 1)" style="width: 40px; padding: 0;">+</button>
                        </div>
                        <div class="mobile-actions">
                            <button class="btn btn-toggle" onclick="event.stopPropagation(); window.open('/admin?client_id=${u.client_id}&su_token=' + encodeURIComponent(getToken()))">Открыть админку клиента</button>
                            <button class="btn btn-toggle ${u.is_active ? 'active' : ''}" onclick="event.stopPropagation(); toggleStatus('${u.client_id}', ${u.is_active})">
                                ${u.is_active ? 'Выключить виджет' : 'Включить виджет'}
                            </button>
                            <button class="btn btn-toggle" onclick="event.stopPropagation(); securityReset('${u.client_id}')">Экстренный сброс</button>
                            <button class="btn btn-del" onclick="event.stopPropagation(); deleteUser('${u.client_id}')">Удалить пользователя</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function addBalance(clientId, isMobile = false, sign = 1) {
            const inputId = isMobile ? 'add-m-' + clientId : 'add-' + clientId;
            const amount = document.getElementById(inputId).value;
            if (!amount) return;
            await fetch('/api/chat/superadmin/update_balance', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + getToken() },
                body: JSON.stringify({ client_id: clientId, amount: amount * sign })
            });
            loadUsers();
        }

        async function toggleStatus(clientId, currentStatus) {
            await fetch('/api/chat/superadmin/toggle_status', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + getToken() },
                body: JSON.stringify({ client_id: clientId, active: !currentStatus })
            });
            loadUsers();
        }

        async function deleteUser(clientId) {
            if (!confirm('Удалить пользователя и все его данные?')) return;
            const res = await fetch('/api/chat/superadmin/delete_user', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + getToken() },
                body: JSON.stringify({ client_id: clientId })
            });
            const data = await res.json();
            if (data.error) alert(data.error);
            loadUsers();
        }

        async function securityReset(clientId) {
            if (!confirm('Экстренно сбросить пароль и временно отключить аккаунт/виджет до восстановления доступа?')) return;
            const res = await fetch('/api/chat/superadmin/security-reset', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + getToken() },
                body: JSON.stringify({ client_id: clientId, disable_account: true })
            });
            const data = await res.json();
            if (data.status !== 'success') {
                alert(data.message || data.detail || 'Не удалось выполнить экстренный сброс');
            } else {
                alert(data.message || 'Экстренный сброс выполнен');
            }
            loadUsers();
        }

        async function setTariff(clientId, tariffId) {
            await fetch('/api/chat/superadmin/set_tariff', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + getToken() },
                body: JSON.stringify({ client_id: clientId, tariff_id: tariffId })
            });
            loadUsers();
        }

        async function extendTariff(clientId) {
            await fetch('/api/chat/superadmin/extend_tariff', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + getToken() },
                body: JSON.stringify({ client_id: clientId, days: 30 })
            });
            loadUsers();
        }

        async function resetTariff(clientId) {
            if (!confirm('Аннулировать тариф и сбросить на Старт?')) return;
            await fetch('/api/chat/superadmin/reset_tariff', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + getToken() },
                body: JSON.stringify({ client_id: clientId })
            });
            loadUsers();
        }

        loadUsers();
    </script>
</body>
