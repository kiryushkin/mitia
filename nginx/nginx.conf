upstream fastapi_app {
    server api:5007;
}

server {
    listen 80;
    server_name mitia.pro;

    # Редирект на HTTPS (раскомментировать после настройки SSL)
    # return 301 https://$server_name$request_uri;

    client_max_body_size 20M;

    # Раздача статики напрямую через Nginx
    location /api/chat/static/ {
        alias /app/api/chat/static/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Проксирование всех остальных запросов к FastAPI
    location / {
        proxy_pass http://fastapi_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Настройки для WebSocket
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_read_timeout 86400;
    }
}
